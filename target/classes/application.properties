# --- Server Configuration ---
# Render.com provides the port via the PORT environment variable
server.port=${PORT:9090}

# --- Database Connection (TiDB / MySQL) ---
# All database credentials must be set via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# --- Multipart File Upload Configuration ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- JWT Secret Key ---
jwt.secret.key=${JWT_SECRET_KEY}

# --- Brevo (Sendinblue) API Configuration ---
brevo.api.key=${BREVO_API_KEY}
brevo.api.url=https://api.brevo.com/v3/smtp/email
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# --- Cloudinary Configuration ---
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# --- File Upload Path ---
# Fallback to local 'uploads' directory for legacy support
upload.path=${UPLOAD_PATH:uploads}

# --- CORS Configuration ---
# Allowed origins must be provided as a comma-separated list via environment variable
allowed.origins=${ALLOWED_ORIGINS}
